<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dontry Analytics</title>
<style>
  :root{
    --bg:#ffffff;
    --panel:#f7f8fa;
    --line:#e3e7ec;
    --text:#1c2530;
    --muted:#6b7685;
    --accent:#0e9f6e;
    --warn:#b7791f;
    --err:#d1453d;
    --mono: "SFMono-Regular", "JetBrains Mono", Consolas, "Liberation Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding:32px 36px 22px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0 0 4px;
    font-size:22px;
    font-weight:650;
    letter-spacing:-0.01em;
  }
  header h1 span{ color:var(--accent); }
  header p{
    margin:0;
    color:var(--muted);
    font-size:13px;
  }
  .toolbar{
    display:flex;
    gap:12px;
    align-items:center;
    padding:18px 36px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .search-wrap{
    position:relative;
    flex:1;
    min-width:240px;
    max-width:420px;
  }
  .search-wrap svg{
    position:absolute;
    left:12px; top:50%;
    transform:translateY(-50%);
    width:15px; height:15px;
    color:var(--muted);
  }
  #search{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 12px 10px 34px;
    color:var(--text);
    font-size:13.5px;
    font-family:var(--mono);
    outline:none;
    transition:border-color .15s;
  }
  #search:focus{ border-color:var(--accent); }
  #search::placeholder{ color:var(--muted); }
  .stat{
    font-size:12px;
    color:var(--muted);
    font-family:var(--mono);
    white-space:nowrap;
  }
  .refresh-btn{
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:8px;
    padding:9px 14px;
    font-size:12.5px;
    cursor:pointer;
    font-family:var(--sans);
    transition:.15s;
  }
  .refresh-btn:hover{ border-color:var(--accent); color:var(--accent); }

  .table-scroll{
    overflow-x:auto;
    padding:0 36px 40px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
    min-width:1180px;
    margin-top:18px;
  }
  thead th{
    text-align:left;
    font-family:var(--mono);
    text-transform:uppercase;
    letter-spacing:.04em;
    font-size:10.5px;
    color:var(--muted);
    font-weight:600;
    padding:0 14px 10px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
    font-family:var(--mono);
    color:var(--text);
  }
  tbody tr:hover{ background:#f6f8fa; }
  .badge{
    display:inline-block;
    padding:2px 8px;
    border-radius:20px;
    font-size:11px;
    font-weight:600;
    letter-spacing:.02em;
    white-space:nowrap;
  }
  .b-ready, .b-completed{ background:rgba(14,159,110,.1); color:var(--accent); border:1px solid rgba(14,159,110,.25); }
  .b-no_garment, .b-unclear_garment, .b-partial_garment{ background:rgba(183,121,31,.1); color:var(--warn); border:1px solid rgba(183,121,31,.25); }
  .b-failed, .b-error{ background:rgba(209,69,61,.1); color:var(--err); border:1px solid rgba(209,69,61,.25); }
  .b-processing, .b-na{ background:rgba(107,118,133,.1); color:var(--muted); border:1px solid rgba(107,118,133,.2); }

  .device{ color:var(--text); }
  .device small{ display:block; color:var(--muted); font-size:11px; margin-top:2px; }
  .reason, .err-cell{ color:var(--muted); max-width:220px; }
  .err-cell{ color:var(--err); }
  .timing{ color:var(--text); white-space:nowrap; }
  .timing .slow{ color:var(--warn); }
  .ts{ color:var(--muted); white-space:nowrap; }
  .empty-cell{ color:#3c4753; }

  .empty-state, .loading-state{
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-size:13px;
  }
  .loading-state .dot{
    display:inline-block;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--accent);
    margin:0 2px;
    animation:pulse 1.1s infinite ease-in-out;
  }
  .loading-state .dot:nth-child(2){ animation-delay:.15s; }
  .loading-state .dot:nth-child(3){ animation-delay:.3s; }
  @keyframes pulse{ 0%,80%,100%{opacity:.25} 40%{opacity:1} }

  ::-webkit-scrollbar{ height:8px; width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }

  @media (max-width: 640px){
    header{ padding:22px 18px 16px; }
    header h1{ font-size:19px; }
    header p{ font-size:12px; }

    .toolbar{
      padding:14px 18px;
      gap:10px;
    }
    .search-wrap{
      min-width:0;
      max-width:none;
      flex:1 1 100%;
      order:1;
    }
    .refresh-btn{
      order:2;
      flex:1;
      text-align:center;
    }
    .stat{
      order:3;
      flex:1;
      text-align:right;
    }

    .table-scroll{
      padding:0 0 28px;
      -webkit-overflow-scrolling:touch;
    }
    table{ min-width:920px; font-size:12px; }
    thead th{ padding:0 10px 8px; }
    tbody td{ padding:10px 10px; }

    .reason, .err-cell{ max-width:140px; }
  }

  @media (max-width: 400px){
    header h1{ font-size:17px; }
    .search-wrap svg{ left:10px; }
    #search{ padding:9px 10px 9px 30px; font-size:13px; }
    .refresh-btn{ padding:9px 10px; font-size:12px; }
  }
</style>
</head>
<body>

<header>
  <h1>Dontry <span>Analytics</span></h1>
  <p>Validation &amp; try-on activity — live from Supabase</p>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="search" type="text" placeholder="Search device model or manufacturer…" autocomplete="off">
  </div>
  <button class="refresh-btn" id="refreshBtn">Refresh</button>
  <span class="stat" id="rowCount"></span>
</div>

<div class="table-scroll">
  <table id="dataTable" style="display:none">
    <thead>
      <tr>
        <th>Date &amp; Time</th>
        <th>Device</th>
        <th>Validate Result</th>
        <th>Reason</th>
        <th>Try-On Status</th>
        <th>Validate</th>
        <th>Try-On</th>
        <th>DeepFashion</th>
        <th>Total</th>
        <th>Slowest Step</th>
        <th>Try-On Error</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="loading-state" id="loadingState">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    &nbsp; Loading analytics…
  </div>
  <div class="empty-state" id="emptyState" style="display:none">No matching records found.</div>
</div>

<script>
  // Same-origin by default. If you're opening this file from somewhere
  // OTHER than your deployed backend (e.g. locally, or a different host),
  // set the full backend URL instead, e.g.:
  //   const API_BASE = "https://web-production-ca122.up.railway.app";
  const API_BASE = "";

  const tableEl     = document.getElementById('dataTable');
  const bodyEl      = document.getElementById('tableBody');
  const loadingEl   = document.getElementById('loadingState');
  const emptyEl     = document.getElementById('emptyState');
  const rowCountEl  = document.getElementById('rowCount');
  const searchInput = document.getElementById('search');
  const refreshBtn  = document.getElementById('refreshBtn');

  let debounceTimer = null;

  function fmtDate(iso){
    if(!iso) return '<span class="empty-cell">—</span>';
    const d = new Date(iso);
    if(isNaN(d)) return '<span class="empty-cell">—</span>';
    const date = d.toLocaleDateString(undefined, { day:'2-digit', month:'short', year:'numeric' });
    const time = d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    return `${date}<br><span style="color:var(--muted)">${time}</span>`;
  }

  function fmtMs(ms){
    if(ms === null || ms === undefined) return '<span class="empty-cell">—</span>';
    if(ms >= 1000) return (ms/1000).toFixed(2) + 's';
    return ms + 'ms';
  }

  function badge(value){
    if(!value) return '<span class="empty-cell">—</span>';
    const cls = 'b-' + String(value).toLowerCase();
    return `<span class="badge ${cls}">${value}</span>`;
  }

  function textOrDash(value, cls){
    if(!value) return '<span class="empty-cell">—</span>';
    return `<span class="${cls || ''}">${escapeHtml(value)}</span>`;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.innerText = str;
    return d.innerHTML;
  }

  function render(rows){
    if(!rows || rows.length === 0){
      tableEl.style.display = 'none';
      emptyEl.style.display = 'block';
      rowCountEl.textContent = '';
      return;
    }
    emptyEl.style.display = 'none';
    tableEl.style.display = 'table';
    rowCountEl.textContent = `${rows.length} record${rows.length === 1 ? '' : 's'}`;

    bodyEl.innerHTML = rows.map(r => `
      <tr>
        <td class="ts">${fmtDate(r.created_at)}</td>
        <td class="device">
          ${escapeHtml(r.device_manufacturer || '—')}
          <small>${escapeHtml(r.device_model || '')}</small>
        </td>
        <td>${badge(r.validate_result)}</td>
        <td class="reason">${textOrDash(r.no_garment_reason)}</td>
        <td>${badge(r.tryon_status)}</td>
        <td class="timing">${fmtMs(r.validate_time_ms)}</td>
        <td class="timing">${fmtMs(r.tryon_time_ms)}</td>
        <td class="timing">${fmtMs(r.deepfashion_time_ms)}</td>
        <td class="timing">${fmtMs(r.total_time_ms)}</td>
        <td>${textOrDash(r.slowest_step)}</td>
        <td class="err-cell">${textOrDash(r.tryon_error)}</td>
      </tr>
    `).join('');
  }

  async function fetchData(search){
    loadingEl.style.display = 'block';
    tableEl.style.display = 'none';
    emptyEl.style.display = 'none';
    try{
      const url = new URL((API_BASE || window.location.origin) + '/analytics');
      if(search) url.searchParams.set('search', search);
      const res = await fetch(url);
      const json = await res.json();
      loadingEl.style.display = 'none';
      if(json.success){
        render(json.data);
      } else {
        emptyEl.textContent = json.message || 'Failed to load analytics.';
        emptyEl.style.display = 'block';
      }
    } catch(err){
      loadingEl.style.display = 'none';
      emptyEl.textContent = 'Could not reach backend at ' + API_BASE + '. Is the server running?';
      emptyEl.style.display = 'block';
      console.error(err);
    }
  }

  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => fetchData(searchInput.value.trim()), 350);
  });

  refreshBtn.addEventListener('click', () => fetchData(searchInput.value.trim()));

  fetchData('');
</script>

</body>
</html>
